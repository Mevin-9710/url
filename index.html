<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Queue — Input</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --card: #1a1a1e;
      --border: #2a2a30;
      --rose: #ff4f7b;
      --rose-dim: #ff4f7b22;
      --rose-mid: #ff4f7b66;
      --cyan: #00e5cc;
      --cyan-dim: #00e5cc18;
      --text: #f0eff4;
      --muted: #6b6a75;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255,79,123,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,79,123,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 20px 20px;
    }
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em; color: var(--text); }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rose); box-shadow: 0 0 10px var(--rose); flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }

    .nav-link {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      text-decoration: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-link:hover { border-color: var(--rose-mid); color: var(--rose); }
    .badge {
      background: var(--rose);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
      display: none;
    }
    .badge.show { display: inline-block; }

    .input-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; flex-shrink: 0; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
    .input-card.ready { border-color: var(--rose-mid); box-shadow: 0 0 30px var(--rose-dim); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input, .field textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 12px 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; resize: none; }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field input:focus, .field textarea:focus { border-color: var(--rose-mid); box-shadow: 0 0 0 3px var(--rose-dim); }

    .enter-btn { width: 100%; margin-top: 6px; background: var(--rose); color: #fff; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px; cursor: pointer; opacity: 0; pointer-events: none; transform: translateY(6px); transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s; }
    .enter-btn.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    .enter-btn:hover { background: #ff2a5e; }
    .enter-btn:active { transform: scale(0.98); }

    .saved-header { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 24px 0 12px; padding-left: 2px; display: flex; justify-content: space-between; align-items: center; }
    .clear-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; cursor: pointer; transition: all 0.2s; }
    .clear-btn:hover { border-color: var(--rose-mid); color: var(--rose); }

    .saved-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .saved-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .item-index { font-size: 0.65rem; color: var(--muted); flex-shrink: 0; width: 20px; }
    .item-url { font-size: 0.78rem; color: var(--rose); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-comment { font-size: 0.75rem; color: var(--muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-done { opacity: 0.35; text-decoration: line-through; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--cyan); color: #0d0d0f; font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; padding: 10px 20px; border-radius: 8px; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 100; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="dot"></div>
    <h1>URL Input</h1>
    <a class="nav-link" href="queue.html">
      ⚡ Queue <span class="badge" id="badge">0</span>
    </a>
  </div>

  <div class="input-card" id="inputCard">
    <div class="field">
      <label>URL</label>
      <input type="url" id="urlInput" placeholder="https://example.com" />
    </div>
    <div class="field">
      <label>Comment</label>
      <textarea id="commentInput" rows="3" placeholder="Add a note about this URL…"></textarea>
    </div>
    <button class="enter-btn" id="enterBtn" onclick="addEntry()">↵ &nbsp;Add to Queue</button>
  </div>

  <div id="savedHeader" class="saved-header" style="display:none;">
    <span>Queued items</span>
    <button class="clear-btn" onclick="clearAll()">Clear all</button>
  </div>
  <div class="saved-list" id="savedList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'urlqueue_v1';

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { entries: [], queueIndex: 0 };
      return JSON.parse(raw);
    } catch { return { entries: [], queueIndex: 0 }; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ entries, queueIndex }));
  }

  let { entries, queueIndex } = load();

  const urlInput     = document.getElementById('urlInput');
  const commentInput = document.getElementById('commentInput');
  const enterBtn     = document.getElementById('enterBtn');
  const inputCard    = document.getElementById('inputCard');
  const savedList    = document.getElementById('savedList');
  const savedHeader  = document.getElementById('savedHeader');
  const badge        = document.getElementById('badge');

  function checkReady() {
    const ready = urlInput.value.trim() !== '' && commentInput.value.trim() !== '';
    enterBtn.classList.toggle('visible', ready);
    inputCard.classList.toggle('ready', ready);
  }

  urlInput.addEventListener('input', checkReady);
  commentInput.addEventListener('input', checkReady);

  function addEntry() {
    const url     = urlInput.value.trim();
    const comment = commentInput.value.trim();
    if (!url || !comment) return;
    entries.push({ url, comment });
    urlInput.value = '';
    commentInput.value = '';
    checkReady();
    save();
    renderSavedList();
    updateBadge();
    showToast('Added to queue ✓');
  }

  function clearAll() {
    if (!confirm('Clear all entries and reset the queue?')) return;
    entries = [];
    queueIndex = 0;
    save();
    renderSavedList();
    updateBadge();
  }

  function renderSavedList() {
    savedList.innerHTML = '';
    savedHeader.style.display = entries.length ? 'flex' : 'none';
    entries.forEach((e, i) => {
      const el = document.createElement('div');
      el.className = 'saved-item' + (i < queueIndex ? ' item-done' : '');
      el.innerHTML = `
        <span class="item-index">${i + 1}</span>
        <span class="item-url">${escHtml(e.url)}</span>
        <span class="item-comment">${escHtml(e.comment)}</span>
      `;
      savedList.appendChild(el);
    });
  }

  function updateBadge() {
    const remaining = entries.length - queueIndex;
    badge.textContent = remaining;
    badge.classList.toggle('show', remaining > 0);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  commentInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && urlInput.value.trim() && commentInput.value.trim()) {
      e.preventDefault();
      addEntry();
    }
  });

  // Listen for storage changes from queue.html (e.g. queueIndex advancing)
  window.addEventListener('storage', () => {
    const data = load();
    entries = data.entries;
    queueIndex = data.queueIndex;
    renderSavedList();
    updateBadge();
  });

  renderSavedList();
  updateBadge();
</script>
</body>
</html>
